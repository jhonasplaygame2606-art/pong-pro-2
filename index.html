<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pong PRO 2</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #111, #222);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  color: white;
}

canvas {
  background: #222;
  border: 2px solid white;
  box-shadow: 0 0 30px cyan;
}
</style>
</head>

<body>

<canvas id="game" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== ESTADOS =====
let state = "menu"; 
// menu | mode | controls | difficulty | playing

let gameMode = ""; // ai ou pvp
let controlMode = "arrows";
let difficulty = "medium";

// ===== PLACAR =====
let p1Score = 0;
let p2Score = 0;

// ===== JOGADORES =====
const p1 = { x: 10, y: 200, w: 10, h: 100, dy: 0 };
const p2 = { x: 780, y: 200, w: 10, h: 100 };

// ===== BOLA =====
const ball = { x: 400, y: 250, r: 10, dx: 5, dy: 3 };

// ===== CONTROLES =====
document.addEventListener("keydown", (e) => {

  // MENU
  if (state === "menu") {
    if (e.key === "1") {
      gameMode = "ai";
      state = "controls";
    }
    if (e.key === "2") {
      gameMode = "pvp";
      state = "playing";
    }
  }

  // CONTROLES IA
  else if (state === "controls") {
    if (e.key === "1") {
      controlMode = "wasd";
      state = "difficulty";
    }
    if (e.key === "2") {
      controlMode = "arrows";
      state = "difficulty";
    }
  }

  // DIFICULDADE
  else if (state === "difficulty") {
    if (e.key === "1") {
      difficulty = "easy";
      state = "playing";
    }
    if (e.key === "2") {
      difficulty = "medium";
      state = "playing";
    }
    if (e.key === "3") {
      difficulty = "hard";
      state = "playing";
    }
  }

  // CONTROLES JOGO
  if (controlMode === "wasd") {
    if (e.key === "w") p1.dy = -6;
    if (e.key === "s") p1.dy = 6;
  } else {
    if (e.key === "ArrowUp") p1.dy = -6;
    if (e.key === "ArrowDown") p1.dy = 6;
  }

  // jogador 2 (sempre setas no pvp)
  if (gameMode === "pvp") {
    if (e.key === "ArrowUp") p2.dy = -6;
    if (e.key === "ArrowDown") p2.dy = 6;
  }

});

document.addEventListener("keyup", () => {
  p1.dy = 0;
  p2.dy = 0;
});

// ===== RESET =====
function resetBall() {
  ball.x = 400;
  ball.y = 250;
  ball.dx = Math.random() > 0.5 ? 5 : -5;
  ball.dy = Math.random() * 4 - 2;
}

// ===== IA =====
function moveAI() {
  let speed = 0.08;

  if (difficulty === "easy") speed = 0.05;
  if (difficulty === "medium") speed = 0.08;
  if (difficulty === "hard") speed = 0.12;

  let target = ball.y - p2.h / 2;
  p2.y += (target - p2.y) * speed;
}

// ===== UPDATE =====
function update() {
  if (state !== "playing") return;

  p1.y += p1.dy;
  p2.y += p2.dy;

  // limites
  [p1, p2].forEach(p => {
    if (p.y < 0) p.y = 0;
    if (p.y + p.h > canvas.height)
      p.y = canvas.height - p.h;
  });

  // IA
  if (gameMode === "ai") moveAI();

  // bola
  ball.x += ball.dx;
  ball.y += ball.dy;

  if (ball.y < 0 || ball.y > canvas.height) {
    ball.dy *= -1;
  }

  // colisões
  if (
    ball.x < p1.x + p1.w &&
    ball.y > p1.y &&
    ball.y < p1.y + p1.h
  ) {
    ball.dx *= -1.1;
  }

  if (
    ball.x > p2.x &&
    ball.y > p2.y &&
    ball.y < p2.y + p2.h
  ) {
    ball.dx *= -1.1;
  }

  // pontos
  if (ball.x < 0) {
    p2Score++;
    resetBall();
  }

  if (ball.x > canvas.width) {
    p1Score++;
    resetBall();
  }
}

// ===== DRAW =====
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.font = "25px Arial";

  if (state === "menu") {
    ctx.fillText("PONG PRO 2", 280, 180);
    ctx.fillText("1 - Jogar contra IA", 260, 240);
    ctx.fillText("2 - 2 Jogadores", 280, 280);
    return;
  }

  if (state === "controls") {
    ctx.fillText("Escolha controle", 280, 200);
    ctx.fillText("1 - WASD", 320, 250);
    ctx.fillText("2 - Setas", 310, 290);
    return;
  }

  if (state === "difficulty") {
    ctx.fillText("Dificuldade", 300, 200);
    ctx.fillText("1 - Fácil", 320, 250);
    ctx.fillText("2 - Médio", 320, 290);
    ctx.fillText("3 - Difícil", 310, 330);
    return;
  }

  // linha do meio
  for (let i = 0; i < canvas.height; i += 20) {
    ctx.fillRect(395, i, 10, 10);
  }

  // bola
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();

  // jogadores
  ctx.fillRect(p1.x, p1.y, p1.w, p1.h);
  ctx.fillRect(p2.x, p2.y, p2.w, p2.h);

  // placar
  ctx.fillText(p1Score, 300, 50);
  ctx.fillText(p2Score, 480, 50);
}

// ===== LOOP =====
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
