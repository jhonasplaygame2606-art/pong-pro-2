<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pong PRO 2</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  color: white;
}

canvas {
  background: #111;
  border: 2px solid white;
  box-shadow: 0 0 20px white;
}
</style>
</head>

<body>

<canvas id="game" width="800" height="500"></canvas>

<script>
// ===== CONFIG =====
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== ESTADO =====
let gameState = "menu";

// ===== PLACAR =====
let playerScore = 0;
let aiScore = 0;

// ===== JOGADOR =====
const player = {
  x: 10,
  y: 200,
  w: 10,
  h: 100,
  speed: 7,
  dy: 0
};

// ===== IA =====
const ai = {
  x: 780,
  y: 200,
  w: 10,
  h: 100,
  speed: 5
};

// ===== BOLA =====
const ball = {
  x: 400,
  y: 250,
  r: 10,
  dx: 5,
  dy: 3
};

// ===== CONTROLES =====
document.addEventListener("keydown", (e) => {
  if (gameState === "menu" && e.key === "Enter") {
    gameState = "playing";
  }

  if (e.key === "ArrowUp") player.dy = -player.speed;
  if (e.key === "ArrowDown") player.dy = player.speed;
});

document.addEventListener("keyup", () => {
  player.dy = 0;
});

// ===== RESET =====
function resetBall() {
  ball.x = 400;
  ball.y = 250;

  ball.dx = Math.random() > 0.5 ? 5 : -5;
  ball.dy = Math.random() * 4 - 2;
}

// ===== UPDATE =====
function update() {
  if (gameState !== "playing") return;

  player.y += player.dy;

  // limites
  if (player.y < 0) player.y = 0;
  if (player.y + player.h > canvas.height)
    player.y = canvas.height - player.h;

  // bola
  ball.x += ball.dx;
  ball.y += ball.dy;

  // parede
  if (ball.y < 0 || ball.y > canvas.height) {
    ball.dy *= -1;
  }

  // jogador colisão
  if (
    ball.x < player.x + player.w &&
    ball.y > player.y &&
    ball.y < player.y + player.h
  ) {
    ball.dx *= -1.1;
  }

  // IA segue bola
  let target = ball.y - ai.h / 2;
  ai.y += (target - ai.y) * 0.12;

  // IA colisão
  if (
    ball.x > ai.x &&
    ball.y > ai.y &&
    ball.y < ai.y + ai.h
  ) {
    ball.dx *= -1.1;
  }

  // pontos
  if (ball.x < 0) {
    aiScore++;
    resetBall();
  }

  if (ball.x > canvas.width) {
    playerScore++;
    resetBall();
  }
}

// ===== DRAW =====
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (gameState === "menu") {
    ctx.font = "40px Arial";
    ctx.fillText("PONG PRO 2", 250, 200);

    ctx.font = "20px Arial";
    ctx.fillText("Pressione ENTER para jogar", 240, 260);
    return;
  }

  // linha do meio
  for (let i = 0; i < canvas.height; i += 20) {
    ctx.fillRect(395, i, 10, 10);
  }

  // bola
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();

  // jogador
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // IA
  ctx.fillRect(ai.x, ai.y, ai.w, ai.h);

  // placar
  ctx.font = "30px Arial";
  ctx.fillText(playerScore, 300, 50);
  ctx.fillText(aiScore, 480, 50);
}

// ===== LOOP =====
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
